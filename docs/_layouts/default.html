<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="{{ '/_assets/main.css' | relative_url }}">
    <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  </head>
  <body>
    {% include navbar.html %}
    {{ content }}
    {% if page.url == '/about.html' or page.url == '/about/' %}
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/html2canvas@latest/dist/html2canvas.min.js"></script>
    <script>
      document.getElementById('download-cv-btn').addEventListener('click', async function() {
        const element = document.getElementById('cv-content');
        const primaryAccent = getComputedStyle(document.documentElement).getPropertyValue('--primary-accent').trim();
        element.querySelectorAll('a').forEach(a => a.innerHTML = `<nobr>${a.textContent}</nobr>`);
        const styleSheet = document.createElement('style');
        styleSheet.textContent = `
          #cv-content header h1 {
            background-color: ${primaryAccent} !important;
            color: #040d09 !important;
            margin: 0 !important;
            padding: 20px !important;
          }
          #cv-content header address {
            margin: 0 !important;
            padding: 10px 20px !important;
          }
          #cv-content {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
          }
          #cv-content section {
            margin: 20px;
          }
          #cv-content h2 {
            margin-top: 20px;
            margin-bottom: 10px;
          }
          #cv-content table {
            width: 100%;
            border-collapse: collapse;
          }
          #cv-content ul {
            margin: 10px 0;
            padding-left: 20px;
          }
        `;
        document.head.appendChild(styleSheet);
        
        try {
          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF('portrait', 'mm', 'a4');
          const pdfWidth = pdf.internal.pageSize.getWidth();
          const pdfHeight = pdf.internal.pageSize.getHeight();
          await pdf.html(element, {
            x: 0,
            y: 0,
            width: 210,
            windowWidth: 794,
            autoPaging: 'text'
          });
          pdf.save('cv.pdf');
        } finally {
          document.head.removeChild(styleSheet);
        }
      });
    </script>
    {% endif %}
  </body>
</html>
